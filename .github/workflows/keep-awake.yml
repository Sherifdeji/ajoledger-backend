name: Keep Render Awake

on:
  schedule:
    # This cron syntax means "run every 5 minutes"
    - cron: "*/5 * * * *"

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API Docs
        # Replace the URL below with your actual Render URL
        run: curl -s https://ajoledger-backend.onrender.com/api/docs > /dev/null
