name: Keep Render Awake

on:
  schedule:
    # Changed to 10 minutes. GitHub is much more likely to run this reliably!
    - cron: "*/10 * * * *"
  # This is the magic key: it adds a button in GitHub so you can test it immediately
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API
        # Swapped to /api/v1 since your NestJS logs showed this is a valid GET route
        run: curl -s https://ajoledger-backend.onrender.com/api/v1 > /dev/null
